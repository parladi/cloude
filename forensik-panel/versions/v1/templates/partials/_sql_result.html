{% if status == 'success' %}
  <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
    <div class="flex items-center justify-between">
      <div>
        <div class="font-semibold text-green-900">Sorgu tamamlandi</div>
        <div class="text-sm text-green-700 mt-1">
          <strong>{{ '%.2f'|format(duration) }} saniye</strong> ·
          {{ total_rows }} satir
          {% if truncated %}
            · <span class="text-amber-700">Ilk {{ display_rows }} satir gosteriliyor</span>
          {% endif %}
        </div>
      </div>
      <div class="flex gap-2">
        <a href="/archive/{{ query_id }}/download?format=csv"
           class="px-3 py-1.5 bg-white border border-slate-300 rounded text-sm hover:bg-slate-50">CSV</a>
        <a href="/archive/{{ query_id }}/download?format=xlsx"
           class="px-3 py-1.5 bg-white border border-slate-300 rounded text-sm hover:bg-slate-50">Excel</a>
        <a href="/archive/{{ query_id }}/download?format=md"
           class="px-3 py-1.5 bg-white border border-slate-300 rounded text-sm hover:bg-slate-50">MD</a>
        <button onclick="copyMd({{ query_id }})"
                class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">Panoya (Claude)</button>
      </div>
    </div>
  </div>

  <div id="tabulator-{{ query_id }}" style="min-height: 400px;"></div>

  <script>
  (function() {
    var data = {{ rows_json|safe }};
    var cols = {{ columns_json|safe }};

    if (window.currentTabulator) {
      try { window.currentTabulator.destroy(); } catch(e) {}
    }

    if (typeof Tabulator === 'undefined') {
      document.getElementById('tabulator-{{ query_id }}').innerHTML =
        '<div class="bg-amber-50 border border-amber-200 rounded-lg p-4">' +
        'Tabulator yuklenmedi. Vendor dosyalari eksik olabilir.</div>';
      return;
    }

    window.currentTabulator = new Tabulator("#tabulator-{{ query_id }}", {
      data: data,
      columns: cols,
      layout: "fitDataStretch",
      pagination: "local",
      paginationSize: 50,
      paginationSizeSelector: [25, 50, 100, 500, 1000],
      movableColumns: true,
      resizableColumns: true,
      height: "500px"
    });
  })();
  </script>

{% else %}
  <div class="bg-red-50 border border-red-200 rounded-lg p-4">
    <div class="font-semibold text-red-900">Hata</div>
    <pre class="text-sm text-red-700 mt-2 whitespace-pre-wrap">{{ error }}</pre>
  </div>
{% endif %}
